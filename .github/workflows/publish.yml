name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run verification tests
        run: cargo test --all-targets

      - name: Publish tinyxml2 core crate
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          echo "Detected version: $VERSION"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -H "User-Agent: tinyxml2-rs-publish-ci (github-actions)" https://crates.io/api/v1/crates/tinyxml2/$VERSION)
          if [ "$STATUS" -eq 200 ]; then
            echo "tinyxml2@$VERSION is already published. Skipping."
          else
            cargo publish --package tinyxml2
          fi

      - name: Sleep for 30 seconds for crates.io index propagation
        run: sleep 30

      - name: Publish tinyxml2-capi FFI crate
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -H "User-Agent: tinyxml2-rs-publish-ci (github-actions)" https://crates.io/api/v1/crates/tinyxml2-capi/$VERSION)
          if [ "$STATUS" -eq 200 ]; then
            echo "tinyxml2-capi@$VERSION is already published. Skipping."
          else
            cargo publish --package tinyxml2-capi
          fi

      - name: Publish tinyxml2-bench benchmark crate
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -H "User-Agent: tinyxml2-rs-publish-ci (github-actions)" https://crates.io/api/v1/crates/tinyxml2-bench/$VERSION)
          if [ "$STATUS" -eq 200 ]; then
            echo "tinyxml2-bench@$VERSION is already published. Skipping."
          else
            cargo publish --package tinyxml2-bench
          fi

  release-assets:
    name: Build and Attach Release Assets
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binaries
        run: cargo build --package tinyxml2-capi --release

      - name: Package Assets (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/release/libtinyxml2_capi.* dist/ 2>/dev/null || true
          cp crates/tinyxml2-capi/include/tinyxml2.h dist/ 2>/dev/null || true
          cd dist
          tar -czf ../tinyxml2-capi-${{ matrix.os }}.tar.gz *

      - name: Package Assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/tinyxml2_capi.dll dist/ -ErrorAction SilentlyContinue
          Copy-Item target/release/tinyxml2_capi.dll.lib dist/ -ErrorAction SilentlyContinue
          Copy-Item target/release/tinyxml2_capi.lib dist/ -ErrorAction SilentlyContinue
          Copy-Item crates/tinyxml2-capi/include/tinyxml2.h dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath tinyxml2-capi-windows-latest.zip

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tinyxml2-capi-*.tar.gz
            tinyxml2-capi-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
