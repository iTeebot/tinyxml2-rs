name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run verification tests
        run: cargo test --all-targets

      - name: Publish tinyxml2 core crate
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          echo "Detected version: $VERSION"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://crates.io/api/v1/crates/tinyxml2/$VERSION)
          if [ "$STATUS" -eq 200 ]; then
            echo "tinyxml2@$VERSION is already published. Skipping."
          else
            cargo publish --package tinyxml2 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi

      - name: Sleep for 30 seconds for crates.io index propagation
        run: sleep 30

      - name: Publish tinyxml2-capi FFI crate
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://crates.io/api/v1/crates/tinyxml2-capi/$VERSION)
          if [ "$STATUS" -eq 200 ]; then
            echo "tinyxml2-capi@$VERSION is already published. Skipping."
          else
            cargo publish --package tinyxml2-capi --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi

      - name: Publish tinyxml2-bench benchmark crate
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://crates.io/api/v1/crates/tinyxml2-bench/$VERSION)
          if [ "$STATUS" -eq 200 ]; then
            echo "tinyxml2-bench@$VERSION is already published. Skipping."
          else
            cargo publish --package tinyxml2-bench --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
