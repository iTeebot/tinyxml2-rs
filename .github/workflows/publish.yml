name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run verification tests
        run: cargo test --all-targets

      - name: Publish tinyxml2 core crate
        run: cargo publish --package tinyxml2 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Sleep for 30 seconds for crates.io index propagation
        run: sleep 30

      - name: Publish tinyxml2-capi FFI crate
        run: cargo publish --package tinyxml2-capi --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
