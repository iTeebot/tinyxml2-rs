name: Bug Report
description: Report a bug or unexpected behavior in tinyxml2-rs
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form
        below so we can reproduce and fix the issue as quickly as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Parse this XML document...
        2. Call this method...
        3. Observe this error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual behavior...
    validations:
      required: true

  - type: textarea
    id: xml-input
    attributes:
      label: XML Input
      description: >
        If applicable, provide the XML input that triggers the bug.
        This will be rendered as code, so no need for backticks.
      render: xml
      placeholder: |
        <root>
          <element attribute="value">text</element>
        </root>
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your environment.
      value: |
        - **OS**: [e.g., Ubuntu 24.04, Windows 11, macOS 15]
        - **Rust version**: [e.g., 1.85.0]
        - **tinyxml2-rs version**: [e.g., 0.1.0]
        - **tinyxml2-sys version**: [e.g., 0.1.0 (if applicable)]
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: >
        Add any other context about the problem here — logs, screenshots,
        related issues, links to upstream TinyXML2 behavior, etc.
      placeholder: Any additional context...
    validations:
      required: false
